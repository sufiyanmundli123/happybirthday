<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Gift</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:linear-gradient(135deg,#16001f,#31003d,#54005f);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.gift-container{
text-align:center;
}

h1{
margin-bottom:40px;
font-size:40px;
}

.gift{

font-size:140px;

cursor:pointer;

animation:shake 1s infinite;

transition:.4s;

}

.gift:hover{

transform:scale(1.2);

}

@keyframes shake{

0%{transform:rotate(0deg);}
25%{transform:rotate(-8deg);}
50%{transform:rotate(8deg);}
75%{transform:rotate(-8deg);}
100%{transform:rotate(0deg);}

}

#message{

display:none;

font-size:30px;

margin-top:30px;

animation:fadeIn 2s;

}

@keyframes fadeIn{

from{opacity:0;}
to{opacity:1;}

}

.next{

display:none;

margin-top:40px;

}

</style>

</head>

<body>

<div class="gift-container">

<h1>🎁 Tap the Gift 🎁</h1>

<div class="gift" id="gift">
🎁
</div>

<div id="message">

✨ The adventure begins now... ✨

</div>

<button class="next" id="nextBtn">

Continue ❤️

</button>

</div>

<script>

const gift=document.getElementById("gift");

const message=document.getElementById("message");

const next=document.getElementById("nextBtn");

gift.onclick=function(){

gift.innerHTML="💖";

gift.style.animation="none";

gift.style.transform="scale(1.3)";

message.style.display="block";

next.style.display="inline-block";

}

next.onclick=function(){

window.location.href="balloons.html";

}

</script>

</body>

</html>
