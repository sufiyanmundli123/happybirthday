<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Love Letter</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#ffdde1,#ee9ca7);

overflow:hidden;

}

.container{

width:90%;
max-width:700px;

background:white;

padding:40px;

border-radius:25px;

box-shadow:0 0 40px rgba(0,0,0,.25);

text-align:center;

position:relative;

}

h1{

font-family:'Dancing Script',cursive;

font-size:50px;

color:#ff4081;

margin-bottom:25px;

}

#text{

font-size:22px;

line-height:1.8;

color:#444;

min-height:250px;

}

button{

display:none;

margin-top:30px;

padding:15px 40px;

border:none;

border-radius:30px;

background:#ff4081;

color:white;

font-size:20px;

cursor:pointer;

}

.heart{

position:absolute;

font-size:22px;

animation:fall linear forwards;

pointer-events:none;

}

@keyframes fall{

0%{
transform:translateY(-50px);
opacity:1;
}

100%{

transform:translateY(110vh);

opacity:0;

}

}

</style>

</head>

<body>

<div class="container">

<h1>💌 A Letter For You</h1>

<div id="text"></div>

<button id="nextBtn">

Next Surprise ❤️

</button>

</div>

<script>

const message=

`Happy Birthday, choba Baba! ❤️

Today is all about celebrating you.

May your smile always stay bright,
your heart always stay happy,
and every dream you have come true.

Keep believing in yourself,
keep shining,
and never stop smiling.

Enjoy your special day.

Happy Birthday once again! 🎂❤️`;

let i=0;

function type(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i);

i++;

setTimeout(type,45);

}

else{

document.getElementById("nextBtn").style.display="inline-block";

}

}

type();

setInterval(function(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),7000);

},350);

document.getElementById("nextBtn").onclick=function(){

window.location.href="wheel.html";

}

</script>

</body>

</html>
