<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>10 Beautiful Wishes ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9ec7,#ffd6e8,#fff5fa);
overflow:hidden;
text-align:center;
}

.card{
width:90%;
max-width:650px;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 0 30px rgba(0,0,0,.2);
}

h1{
color:#ff0066;
margin-bottom:20px;
}

#count{
font-size:18px;
margin-bottom:20px;
color:#666;
}

#reason{
font-size:28px;
min-height:150px;
display:flex;
align-items:center;
justify-content:center;
color:#444;
line-height:1.6;
}

button{
margin-top:25px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff4081;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="card">

<h1>💖 10 Beautiful Wishes 💖</h1>

<div id="count">
Wish 1 / 10
</div>

<div id="reason">
🌸 May your smile always shine brighter than today. ❤️
</div>

<button id="next">
Next ❤️
</button>

</div>

<script>

const reasons=[

"🌸 May your smile always shine brighter than today. ❤️",

"🎂 May this birthday bring you endless happiness and unforgettable memories.",

"🌈 May every dream in your heart come true.",

"💖 Stay healthy, stay strong, and keep smiling always.",

"✨ You deserve all the love, success, and joy in the world.",

"🌹 Never stop believing in yourself because you're truly amazing.",

"😊 May your life always be filled with laughter and beautiful moments.",

"🎁 Wishing you a year full of blessings, peace, and happiness.",

"❤️ Happy Birthday once again, Baba! You deserve the very best.",

"🎉 The biggest surprise is still waiting for you... Tap Next! 🎁"

];

let i=0;

const reason=document.getElementById("reason");
const count=document.getElementById("count");
const btn=document.getElementById("next");

btn.onclick=function(){

i++;

if(i<reasons.length){

reason.innerHTML=reasons[i];

count.innerHTML="Wish "+(i+1)+" / 10";

}else{

window.location.href="final.html";

}

}

</script>

</body>
</html>
