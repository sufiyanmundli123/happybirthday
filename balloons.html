<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balloon Surprise</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:linear-gradient(135deg,#ff6fa5,#ff9ec7,#ffd6e8);
overflow:hidden;
text-align:center;
padding-top:30px;
}

h1{
color:white;
margin-bottom:10px;
}

p{
color:white;
font-size:18px;
margin-bottom:20px;
}

.balloon-area{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.balloon{
width:80px;
height:100px;
border-radius:50%;
cursor:pointer;
animation:float 2.5s ease-in-out infinite;
position:relative;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:60px;
background:white;
left:50%;
top:100%;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

#messageBox{
display:none;
margin:30px auto;
width:90%;
max-width:500px;
padding:20px;
background:white;
color:#ff4081;
border-radius:20px;
font-size:22px;
font-weight:bold;
}

#nextBtn{
display:none;
margin-top:20px;
}

.confetti{
position:absolute;
font-size:24px;
animation:fall 1.5s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-50px);
opacity:1;
}
100%{
transform:translateY(300px);
opacity:0;
}
}

</style>

</head>

<body>

<h1>🎈 Pop Every Balloon 🎈</h1>

<p>Each balloon hides a special surprise ❤️</p>

<div class="balloon-area" id="area"></div>

<div id="messageBox"></div>

<button id="nextBtn">Continue ➜</button>

<script>

const colors=[
"#ff4d6d",
"#ff758f",
"#ffb703",
"#06d6a0",
"#118ab2",
"#9d4edd",
"#f72585",
"#ff006e"
];

const messages=[
"🌹 happy birthday yanna baba.",
"😊 Keep smiling forever.",
"🎂 May all your dreams come true.",
"❤️ last time wish malpandhinaik sorry",
"✨ miss you chona",
"🌸 Today is your special day.",
"💖 You are truly wonderful.",
"🎁 Final surprise unlocked!"
];

let popped=0;

const area=document.getElementById("area");
const box=document.getElementById("messageBox");

for(let i=0;i<8;i++){

const b=document.createElement("div");

b.className="balloon";

b.style.background=colors[i];

b.onclick=function(){

if(b.style.visibility=="hidden") return;

b.style.visibility="hidden";

box.style.display="block";

box.innerHTML=messages[i];

for(let j=0;j<20;j++){

const c=document.createElement("div");

c.className="confetti";

c.innerHTML=["🎉","✨","💖","❤️"][Math.floor(Math.random()*4)];

c.style.left=Math.random()*window.innerWidth+"px";

c.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(c);

setTimeout(()=>c.remove(),1500);

}

popped++;

if(popped==8){

document.getElementById("nextBtn").style.display="inline-block";

}

}

area.appendChild(b);

}

document.getElementById("nextBtn").onclick=function(){

window.location.href="mirror.html";

}

</script>

</body>
</html>
