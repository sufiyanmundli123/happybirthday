<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel of Surprises</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
background:linear-gradient(135deg,#ff6fa5,#ffd6e8);
overflow:hidden;
}

h1{
color:white;
margin-bottom:20px;
text-shadow:0 0 10px rgba(0,0,0,.3);
}

#wheel{
width:300px;
height:300px;
border-radius:50%;
border:8px solid white;
background:
conic-gradient(
#ff4d6d 0deg 45deg,
#ffd166 45deg 90deg,
#06d6a0 90deg 135deg,
#118ab2 135deg 180deg,
#9d4edd 180deg 225deg,
#f72585 225deg 270deg,
#ff8fab 270deg 315deg,
#ffb703 315deg 360deg
);
transition:transform 5s ease-out;
box-shadow:0 0 30px rgba(0,0,0,.3);
}

.pointer{
font-size:40px;
margin-bottom:-10px;
color:#fff;
}

button{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:30px;
font-size:20px;
background:#ff4081;
color:white;
cursor:pointer;
}

#result{
margin-top:25px;
font-size:24px;
font-weight:bold;
color:white;
text-align:center;
padding:0 20px;
display:none;
}

#nextBtn{
display:none;
}
</style>
</head>

<body>

<div class="pointer">⬇️</div>

<h1>🎡 Spin the Wheel</h1>

<div id="wheel"></div>

<button id="spinBtn">Spin ❤️</button>

<div id="result"></div>

<button id="nextBtn">Next Surprise ➜</button>

<script>

const prizes=[
"🌹 A Beautiful Rose",
"🤗 A Warm Hug",
"🍫 Sweet Chocolate",
"🎂 Birthday Blessing",
"❤️ Endless Happiness",
"🎁 Secret Surprise",
"✨ Lucky Day",
"😊 Keep Smiling Forever"
];

let spun=false;

document.getElementById("spinBtn").onclick=function(){

if(spun) return;

spun=true;

let degree=3600+Math.floor(Math.random()*360);

document.getElementById("wheel").style.transform=
"rotate("+degree+"deg)";

setTimeout(function(){

let index=Math.floor(Math.random()*prizes.length);

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
"You Won:<br><br>"+prizes[index];

document.getElementById("nextBtn").style.display="inline-block";

},5000);

}

document.getElementById("nextBtn").onclick=function(){

window.location.href="heartgame.html";

}

</script>

</body>
</html>
