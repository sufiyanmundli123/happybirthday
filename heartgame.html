<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catch 5 Hearts ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ff8fb1,#ffc1d6,#fff5f9);
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
text-align:center;
}

h1{
margin-top:25px;
color:#ff0066;
font-size:32px;
text-shadow:0 0 10px rgba(255,0,100,.3);
}

p{
margin-top:10px;
font-size:18px;
color:#444;
}

#score{
margin-top:18px;
font-size:28px;
font-weight:bold;
color:#ff0066;
}

.progress{
width:280px;
height:18px;
background:#ffd6e8;
border-radius:30px;
margin-top:18px;
overflow:hidden;
box-shadow:0 0 10px rgba(255,0,100,.25);
}

#bar{
width:0%;
height:100%;
background:linear-gradient(90deg,#ff4081,#ff80ab);
transition:.4s;
}

.heart{
position:absolute;
cursor:pointer;
user-select:none;
animation:floatUp 5s linear forwards,wiggle 1.5s ease-in-out infinite;
filter:drop-shadow(0 0 10px #ff5fa2);
}

@keyframes floatUp{
0%{
transform:translateY(100vh);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(-150px);
opacity:0;
}
}

@keyframes wiggle{
0%{margin-left:0;}
25%{margin-left:-10px;}
50%{margin-left:10px;}
75%{margin-left:-6px;}
100%{margin-left:0;}
}

.popup{
position:absolute;
font-size:22px;
font-weight:bold;
color:#ff0066;
animation:fade 1.2s forwards;
pointer-events:none;
}

@keyframes fade{
0%{
opacity:1;
transform:translateY(0);
}
100%{
opacity:0;
transform:translateY(-60px);
}
}

#message{
display:none;
margin-top:25px;
font-size:24px;
font-weight:bold;
color:#ff0066;
animation:pop .7s ease;
}

@keyframes pop{
0%{
transform:scale(.5);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

button{
display:none;
margin-top:25px;
padding:15px 40px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff0066,#ff66a3);
color:white;
font-size:20px;
cursor:pointer;
box-shadow:0 8px 20px rgba(255,0,102,.35);
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.confetti{
position:absolute;
top:-20px;
animation:fall 4s linear forwards;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}
</style>

</head>
<body>

<h1>💖 Catch the Hearts 💖</h1>

<p>Catch all <b>5 magical hearts</b> to unlock your surprise! ✨</p>

<div id="score">0 / 5</div>

<div class="progress">
<div id="bar"></div>
</div>

<div id="message">
🎉 You caught every heart! 💖<br>
Your surprise is ready... ❤️
</div>

<button id="nextBtn">
Open Surprise 🎁
</button>

<script>

let total=5;
let caught=0;

const compliments=[
"🌹 Beautiful!",
"💖 Cute!",
"😍 Lovely!",
"✨ Amazing!",
"🥰 Sweet!",
"💕 Gorgeous!",
"😊 Perfect!",
"❤️ My Favorite!"
];

function createHeart(){

if(caught>=total) return;

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*90+"vw";

heart.style.fontSize=(35+Math.random()*25)+"px";

heart.onclick=function(){

caught++;

document.getElementById("score").innerHTML=caught+" / "+total;

document.getElementById("bar").style.width=(caught/total*100)+"%";

let popup=document.createElement("div");

popup.className="popup";

popup.style.left=heart.style.left;

popup.style.top="45%";

popup.innerHTML=compliments[Math.floor(Math.random()*compliments.length)];

document.body.appendChild(popup);

setTimeout(()=>popup.remove(),1200);

heart.remove();

if(caught===total){

celebrate();

document.getElementById("message").style.display="block";

document.getElementById("nextBtn").style.display="inline-block";

}

}

document.body.appendChild(heart);

setTimeout(()=>{

if(document.body.contains(heart))
heart.remove();

},5000);

}

function celebrate(){

const emojis=["🎉","✨","💖","🌸","💕"];

for(let i=0;i<80;i++){

let c=document.createElement("div");

c.className="confetti";

c.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

c.style.left=Math.random()*100+"vw";

c.style.fontSize=(18+Math.random()*18)+"px";

document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

}

setInterval(createHeart,900);

document.getElementById("nextBtn").onclick=function(){

window.location.href="treasure.html";

}

</script>

</body>
</html>
